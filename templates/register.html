<!DOCTYPE html>
<html>

<head>

    <title>Register User</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <main class="auth-container">

        <section class="auth-card">

            <h1>Create Account</h1>

            <p class="subtitle">
                Register a new user account.
            </p>

            {% if error %}

                <p class="error-message">
                    {{ error }}
                </p>

            {% endif %}

            <form method="POST" class="auth-form">

                <div>

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        required
                    >

                </div>

                <div>

                    <label>
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        required
                    >

                </div>

                <div>

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        required
                    >

                </div>

                <button type="submit">

                    Register

                </button>

            </form>

            <p class="auth-footer">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </p>

        </section>

    </main>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
